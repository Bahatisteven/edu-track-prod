<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Notes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">🎓 EduTrack</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="subjects.html">Subjects</a>
            <a href="calculator.html">Calculator</a>
            <a href="notes.html" class="active">Notes</a>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h2>Study Notes</h2>
                <button class="btn btn-primary" id="add-note-btn">+ New Note</button>
            </div>
        </section>

        <section class="container">
            <div class="notes-grid" id="notes-container">
                <!-- Notes are added dynamically by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 EduTrack</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/notes.js"></script>

    <style>
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 24px 0;
        }
        .note-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .note-textarea {
            width: 100%;
            border: none;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
        }
        .note-delete {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.5;
        }
        .note-delete:hover { opacity: 1; }
    </style>
</body>
</html>
