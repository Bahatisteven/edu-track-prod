<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🎓 EduTrack</div>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="subjects.html">Subjects</a>
            <a href="calculator.html">Calculator</a>
            <a href="notes.html">Notes</a>
        </nav>
    </header>

    <main>
        <!-- Hero section -->
        <section class="hero">
            <h1>Welcome, <span id="student-name">Student</span>!</h1>
            <p class="subtitle">Track your academic progress in one place</p>
        </section>

        <!-- Stats cards -->
        <section class="stats-section">
            <div class="container">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="total-subjects">4</div>
                        <div class="stat-label">Subjects</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="average">--</div>
                        <div class="stat-label">Average Grade</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="gpa">--</div>
                        <div class="stat-label">GPA (out of 4.0)</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="credits">11</div>
                        <div class="stat-label">Total Credits</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 EduTrack · Level 3 Internship Project</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
