<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - Subjects</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">🎓 EduTrack</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="subjects.html" class="active">Subjects</a>
            <a href="calculator.html">Calculator</a>
            <a href="notes.html">Notes</a>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h2>My Subjects</h2>
                <button class="btn btn-primary" id="add-btn">+ Add Subject</button>
            </div>
        </section>

        <section class="container">
            <!-- Search bar -->
            <input type="text" id="search-input" class="search-input" placeholder="Search subjects...">

            <!-- Subject cards -->
            <div class="subjects-grid" id="subjects-container">
                <!-- Subjects are rendered dynamically by JavaScript -->
            </div>
        </section>
    </main>

    <!-- Modal for Add/Edit (Added in Day 9) -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title">Add Subject</h3>
            <form id="subject-form">
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="f-name" required placeholder="e.g. JavaScript">
                </div>
                <div class="form-group">
                    <label>Code</label>
                    <input type="text" id="f-code" required placeholder="e.g. SWDJF301">
                </div>
                <div class="form-group">
                    <label>Grade (%)</label>
                    <input type="number" id="f-grade" min="0" max="100" required>
                </div>
                <div class="form-group">
                    <label>Credits</label>
                    <input type="number" id="f-credits" min="1" max="10" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn" id="modal-close">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Subject</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 EduTrack</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/data.js"></script>
    <script src="js/subjects.js"></script>

    <style>
        /* Modal styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-md);
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); }
        .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    </style>
</body>
</html>
